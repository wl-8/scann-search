# Conda environment for scann-search backend.
# Usage:
#   conda env create -f environment.yml
#   conda activate scann-search
#
# 二进制依赖（numpy / scipy / faiss / scanpy）走 conda-forge 拿预编译版本，
# 纯 Python 包（fastapi / sqlalchemy / pydantic / hnswlib 等）通过 pip 装。
name: scann-search
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - pandas>=2.0
  - pyarrow>=14
  - faiss-cpu=1.8.*
  - scanpy>=1.10
  - anndata>=0.10
  - plotly>=5.20
  - pip:
      - fastapi>=0.110
      - uvicorn[standard]>=0.27
      - sqlalchemy>=2.0
      - pydantic>=2.6
      - pydantic-settings>=2.2
      - python-jose[cryptography]>=3.3
      - passlib[bcrypt]>=1.7
      - python-multipart>=0.0.9
      - aiofiles>=23.2
      - hnswlib>=0.8
      - pytest>=8.0
      - pytest-asyncio>=0.23
      - httpx>=0.27
